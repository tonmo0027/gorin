<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            position: relative;
            width: 150px;
            height: 150px;
            border: 10px solid rgb(211, 211, 211);
            border-top: 10px solid rgb(253, 57, 57);
            border-radius: 50%;
            animation: anime 2s linear infinite;
            /* background-color: rgb(211, 211, 211); */
        }

        @keyframes anime {
            0% {
                rotate: 0;
            }
            100% {
                rotate: 360deg;
            }
        }
    </style>
</head>
<body>
    <div>
        
    </div>
</body>
</html>
